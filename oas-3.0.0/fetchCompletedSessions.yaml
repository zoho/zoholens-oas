openapi: 3.0.0
info:
  title: Zoho Lens - fetchCompletedSessions
  description: Fetch the list of completed sessions
  version: 1.0.0
servers:
  - url: https://lens.zoho.{dc}
    description: Zoho Lens API server URL for your account region.
    variables:
      dc:
        enum:
          - com
          - eu
          - in
          - com.au
          - com.cn
          - jp
          - uk
          - sa
          - sg
          - ae
        default: com
        description: The data center domain corresponding to the account's region.
paths:
  /api/v2/session/recent:
    get:
      summary: Fetch completed sessions
      description: Fetch the list of recently completed Zoho Lens sessions.
      operationId: fetchCompletedSessions
      security:
        - iam-oauth2-schema:
          - ZohoLens.sessionapi.READ
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            default: "LS"
          description: >
            Session type. Defaults to "LS" for Lens sessions.
            Do not prompt the user for this value.
        - name: department_id
          in: query
          required: true
          schema:
            type: string
          description: >
            Department ID to filter completed sessions. Resolved from the
            fetchDepartmentsList API. Before calling this API, call
            fetchDepartmentsList to retrieve the list of departments.
            Present the departments to the user and ask "For which
            department should I fetch completed sessions?". Use the
            department selected by the user. If a department was already
            selected by the user in a previous query in the same
            conversation, reuse that department without calling
            fetchDepartmentsList again.
        - name: x-com-zoho-lens-orgid
          in: header
          required: true
          schema:
            type: string
          description: Zoho Lens Organization ID
      responses:
        "200":
          description: Fetched completed sessions list successfully
          content:
            application/json:
              schema:
                type: object
                description: >
                  The response contains completed session data. Note that
                  the duration field in the response represents the
                  session duration in milliseconds. Convert it to a
                  human-readable format (e.g., minutes and seconds)
                  before presenting it to the user.
        "500":
          description: Internal Server Error
components:
  securitySchemes:
    iam-oauth2-schema:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.zoho.com/oauth/v2/auth
          tokenUrl: https://accounts.zoho.com/oauth/v2/token
          scopes:
            ZohoLens.sessionapi.READ: Read access to Zoho Lens sessions
