openapi: 3.0.0
info:
  title: Zoho Lens - downloadSessionNotes
  description: Download notes from a Zoho Lens session
  version: 1.0.0
servers:
  - url: https://lens.zoho.{dc}
    description: Zoho Lens API server URL for your account region.
    variables:
      dc:
        enum:
          - com
          - eu
          - in
          - com.au
          - com.cn
          - jp
          - uk
          - sa
          - sg
          - ae
        default: com
        description: The data center domain corresponding to the account's region.
paths:
  /api/v2/session/notes/export:
    get:
      summary: Download session notes
      description: Download the notes from a Zoho Lens session.
      operationId: downloadSessionNotes
      security:
        - iam-oauth2-schema:
          - ZohoLens.sessionapi.READ
      parameters:
        - name: sys_id
          in: query
          required: true
          schema:
            type: string
          description: >
            Session primary key. This is NOT the session ID that the
            user provides. The user will give a session ID (9-10 digits).
            Resolve the corresponding sys_id by calling
            getSysIdForSessionId with the session ID, or obtain it from
            the fetchAllSessionsFilesMetadata API. Do not prompt the
            user for sys_id directly. If the sys_id was already fetched
            for this session ID in the current conversation, reuse it
            instead of calling again.
      responses:
        "200":
          description: >
            Session notes exported successfully. The notes text is
            returned directly in the response body.
          content:
            application/json:
              schema:
                type: object
        "500":
          description: Internal Server Error
components:
  securitySchemes:
    iam-oauth2-schema:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.zoho.com/oauth/v2/auth
          tokenUrl: https://accounts.zoho.com/oauth/v2/token
          scopes:
            ZohoLens.sessionapi.READ: Read access to Zoho Lens sessions
