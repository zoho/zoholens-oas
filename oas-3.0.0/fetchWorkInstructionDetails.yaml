openapi: 3.0.0
info:
  title: Zoho Lens - fetchWorkInstructionDetails
  description: Fetch details of a specific work instruction
  version: 1.0.0
servers:
  - url: https://lens.zoho.{dc}
    description: Zoho Lens API server URL for your account region.
    variables:
      dc:
        enum:
          - com
          - eu
          - in
          - com.au
          - com.cn
          - jp
          - uk
          - sa
          - sg
          - ae
        default: com
        description: The data center domain corresponding to the account's region.
paths:
  /api/v1/workflow/instruction/fetchall:
    get:
      summary: Fetch work instruction details
      description: Fetch the steps and details of a specific work instruction.
      operationId: fetchWorkInstructionDetails
      security:
        - iam-oauth2-schema:
          - ZohoLens.sessionapi.READ
      parameters:
        - name: workflow_id
          in: query
          required: true
          schema:
            type: string
          description: >
            The work instruction ID. Obtained from a previous API
            response (fetchWorkInstructionsList). Ask the user which
            work instruction they want details for if not already
            clear from context.
        - name: index
          in: query
          schema:
            type: integer
            default: 0
          description: >
            Pagination index. Defaults to 0.
            Do not prompt the user for this value.
          x-hidden: true
        - name: x-com-zoho-lens-orgid
          in: header
          required: true
          schema:
            type: string
          description: Zoho Lens Organization ID
      responses:
        "200":
          description: Fetched work instruction details successfully
          content:
            application/json:
              schema:
                type: object
        "500":
          description: Internal Server Error
components:
  securitySchemes:
    iam-oauth2-schema:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.zoho.com/oauth/v2/auth
          tokenUrl: https://accounts.zoho.com/oauth/v2/token
          scopes:
            ZohoLens.sessionapi.READ: Read access to Zoho Lens data
