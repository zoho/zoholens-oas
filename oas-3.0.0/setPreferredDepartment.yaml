openapi: 3.0.0
info:
  title: Zoho Lens - setPreferredDepartment
  description: Set the preferred department for the user
  version: 1.0.0
servers:
  - url: https://lens.zoho.{dc}
    description: Zoho Lens API server URL for your account region.
    variables:
      dc:
        enum:
          - com
          - eu
          - in
          - com.au
          - com.cn
          - jp
          - uk
          - sa
          - sg
          - ae
        default: com
        description: The data center domain corresponding to the account's region.
paths:
  /api/v2/general/settings:
    post:
      summary: Set preferred department
      description: Set the user's preferred department.
      operationId: setPreferredDepartment
      security:
        - iam-oauth2-schema:
          - ZohoLens.settings.general.CREATE
      parameters:
        - name: preferred_department_id
          in: query
          required: true
          schema:
            type: string
          description: >
            The department ID to set as the preferred department.
            Resolved from the fetchDepartmentsList API (prerequisite).
            Before calling this API, call fetchDepartmentsList to
            retrieve the list of departments. Present the departments
            to the user and ask "Which department would you like to set
            as preferred?". Use the department selected by the user.
        - name: x-com-zoho-lens-orgid
          in: header
          required: true
          schema:
            type: string
          description: Zoho Lens Organization ID
      responses:
        "200":
          description: Preferred department set successfully
          content:
            application/json:
              schema:
                type: object
        "500":
          description: Internal Server Error
components:
  securitySchemes:
    iam-oauth2-schema:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.zoho.com/oauth/v2/auth
          tokenUrl: https://accounts.zoho.com/oauth/v2/token
          scopes:
            ZohoLens.settings.general.CREATE: Update access to Zoho Lens settings
